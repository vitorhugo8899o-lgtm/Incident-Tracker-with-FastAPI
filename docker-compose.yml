services:
  db:
    image: postgres:15-alpine
    container_name: incident_tracker_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: incident_tracker_api
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: incident_tracker_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./PageError/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
