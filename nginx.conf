events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name localhost;

        error_page 403 /index.html?code=403;
        error_page 404 /index.html?code=404;
        error_page 500 /index.html?code=500;
        error_page 502 /index.html?code=502;
        error_page 503 /index.html?code=503;
        error_page 504 /index.html?code=504;

        location = /index.html {
            root /usr/share/nginx/html;
            internal;
        }

        location /api/v1/ {
            proxy_pass http://api:8000/api/v1/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }
    }
}
